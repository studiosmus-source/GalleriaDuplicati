name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v3

      - name: Imposta Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Crea gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Crea settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GalleriaDuplicati"
          include ':app'
          EOF

      - name: Crea build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.0.2' apply false
          }
          EOF

      - name: Installa Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'

      - name: Compila APK debug
        run: gradle :app:assembleDebug

      - name: Carica APK
        uses: actions/upload-artifact@v3
        with:
          name: GalleriaDuplicati-debug
          path: app/build/outputs/apk/debug/app-debug.apk
