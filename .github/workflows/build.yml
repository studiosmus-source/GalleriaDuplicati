name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Crea settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GalleriaDuplicati"
          include ':app'
          EOF

      - name: Crea build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.0.2' apply false
          }
          EOF

      - name: Crea gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: GalleriaDuplicati-debug
          path: app/build/outputs/apk/debug/app-debug.apk
